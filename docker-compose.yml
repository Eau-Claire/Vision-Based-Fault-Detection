services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  edge_raspberry:
    build:
      context: .
      dockerfile: edge_raspberry/Dockerfile
    container_name: ai_edge_raspberry
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      - DEVICE_PROFILE=edge
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:?RABBITMQ_USER is required}
      - RABBITMQ_PASS=${RABBITMQ_PASS:?RABBITMQ_PASS is required}
      - CALLBACK_BASE_URL=${CALLBACK_BASE_URL:-http://host.docker.internal:5000}
      - AI_SERVICE_KEY=${AI_SERVICE_KEY:?AI_SERVICE_KEY is required}
      - CONFIDENCE_THRESHOLD=0.25
      - ALLOW_PRIVATE_IPS=${ALLOW_PRIVATE_IPS:-true}
      - AI_ARTIFACT_DIR=/app/artifacts
      - AI_ARTIFACT_URL_PATH=/artifacts
      - AI_PUBLIC_BASE_URL=${EDGE_AI_PUBLIC_BASE_URL:-http://localhost:8001}
      - AI_ARTIFACT_JPEG_QUALITY=${AI_ARTIFACT_JPEG_QUALITY:-90}
    volumes:
      - ./models:/app/models:ro
      - edge_artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"

  server_pc:
    build:
      context: .
      dockerfile: server_pc/Dockerfile
      args:
        INSTALL_LOCAL_ML: ${INSTALL_LOCAL_ML:-false}
    container_name: ai_server_pc
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      - DEVICE_PROFILE=server
      - SERVER_INFERENCE_BACKEND=${SERVER_INFERENCE_BACKEND:-harness}
      - HARNESS_CHECKPOINT_DIR=${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:?RABBITMQ_USER is required}
      - RABBITMQ_PASS=${RABBITMQ_PASS:?RABBITMQ_PASS is required}
      - CALLBACK_BASE_URL=${CALLBACK_BASE_URL:-http://host.docker.internal:5000}
      - AI_SERVICE_KEY=${AI_SERVICE_KEY:?AI_SERVICE_KEY is required}
      - CONFIDENCE_THRESHOLD=0.30
      - RFDETR_DEVICE=auto
      - ALLOW_PRIVATE_IPS=${ALLOW_PRIVATE_IPS:-true}
      - AI_ARTIFACT_DIR=/app/artifacts
      - AI_ARTIFACT_URL_PATH=/artifacts
      - AI_PUBLIC_BASE_URL=${SERVER_AI_PUBLIC_BASE_URL:-http://localhost:8002}
      - AI_ARTIFACT_JPEG_QUALITY=${AI_ARTIFACT_JPEG_QUALITY:-90}
    volumes:
      - ./models:/app/models:ro
      - server_artifacts:/app/artifacts
      - server_harness_checkpoints:${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rabbitmq_data:
  edge_artifacts:
  server_artifacts:
  server_harness_checkpoints:
