services:
  roboflow-inference:
    image: roboflow/roboflow-inference-server-cpu:${ROBOFLOW_INFERENCE_VERSION:-1.3.6}
    container_name: roboflow-inference
    restart: unless-stopped
    expose:
      - "9001"
    environment:
      CORE_MODEL_GAZE_ENABLED: ${CORE_MODEL_GAZE_ENABLED:-false}
      ALLOW_CUSTOM_PYTHON_EXECUTION_IN_WORKFLOWS: ${ALLOW_CUSTOM_PYTHON_EXECUTION_IN_WORKFLOWS:-true}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:9001/health', timeout=3)
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pms_default

  server_pc:
    build:
      context: .
      dockerfile: server_pc/Dockerfile
      args:
        INSTALL_LOCAL_ML: ${INSTALL_LOCAL_ML:-false}
    image: ${AI_SERVER_IMAGE:-aipms-server-pc:latest}
    container_name: ai_server_pc
    restart: unless-stopped
    depends_on:
      roboflow-inference:
        condition: service_healthy
    ports:
      - "127.0.0.1:${AI_SERVER_PORT:-8002}:8002"
    environment:
      DEVICE_PROFILE: server
      SERVER_INFERENCE_BACKEND: ${SERVER_INFERENCE_BACKEND:-roboflow}
      HARNESS_CHECKPOINT_DIR: ${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-uav-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
      CALLBACK_BASE_URL: ${CALLBACK_BASE_URL:-http://uav-gateway:8080}
      AI_SERVICE_KEY: ${AI_SERVICE_KEY:?AI_SERVICE_KEY is required}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.30}
      RFDETR_DEVICE: ${RFDETR_DEVICE:-auto}
      ALLOW_PRIVATE_IPS: ${ALLOW_PRIVATE_IPS:-false}
      RESTRICT_CALLBACK_TO_BASE_URL: ${RESTRICT_CALLBACK_TO_BASE_URL:-true}
      AI_ARTIFACT_DIR: /app/artifacts
      AI_ARTIFACT_URL_PATH: /artifacts
      AI_PUBLIC_BASE_URL: ${AI_PUBLIC_BASE_URL:-http://localhost:8002}
      AI_ARTIFACT_JPEG_QUALITY: ${AI_ARTIFACT_JPEG_QUALITY:-90}
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:?ROBOFLOW_API_KEY is required}
      ROBOFLOW_API_URL: http://roboflow-inference:9001
      ROBOFLOW_WORKSPACE_NAME: ${ROBOFLOW_WORKSPACE_NAME:-les-workspace-ijdwd}
      ROBOFLOW_WORKFLOW_ID: ${ROBOFLOW_WORKFLOW_ID:-evn-object-detection-vevn-object-detection-cnyo0-2-yolo11n-t1-logic}
    volumes:
      - ./models:/app/models:ro
      - server_artifacts:/app/artifacts
      - server_harness_checkpoints:${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pms_default

networks:
  pms_default:
    external: true
    name: ${PMS_DOCKER_NETWORK:-uavpms_org_default}

volumes:
  server_artifacts:
  server_harness_checkpoints:
