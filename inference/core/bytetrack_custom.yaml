# Custom ByteTrack config – tuned for drone / shaky camera
# Higher thresholds = fewer false/duplicate tracks

tracker_type: bytetrack
track_high_thresh: 0.3        # Only high-confidence detections go to first-stage matching
track_low_thresh: 0.1         # Second-stage for recovery
new_track_thresh: 0.5         # High bar to start a NEW track (reduces duplicates)
track_buffer: 60              # Keep lost tracks alive for 60 frames (~2 sec @ 30fps)
match_thresh: 0.75            # Tighter IoU matching to reduce ID switches
fuse_score: True
