version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai_rabbitmq_prod
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  server_pc:
    build:
      context: .
      dockerfile: server_pc/Dockerfile
    container_name: ai_server_pc_prod
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    expose:
      - "8002"
    environment:
      - DEVICE_PROFILE=server
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - CALLBACK_BASE_URL=${CALLBACK_BASE_URL:-https://uavpms.ddns.net}
      - AI_SERVICE_KEY=${AI_SERVICE_KEY:-Reme8lqiErnO9ZppU0SeNattf4ObRvbv}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.30}
      - RFDETR_DEVICE=auto
    volumes:
      - ./models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  caddy:
    image: caddy:2-alpine
    container_name: ai_caddy_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - server_pc

volumes:
  rabbitmq_prod_data:
  caddy_data:
  caddy_config:
  caddy_logs:
