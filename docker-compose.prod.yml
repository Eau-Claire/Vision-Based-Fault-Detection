version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai_rabbitmq_prod
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  server_pc:
    build:
      context: .
      dockerfile: server_pc/Dockerfile
    container_name: ai_server_pc_prod
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - DEVICE_PROFILE=server
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - CALLBACK_BASE_URL=${CALLBACK_BASE_URL:-https://uavpms.ddns.net}
      - AI_SERVICE_KEY=${AI_SERVICE_KEY:-Reme8lqiErnO9ZppU0SeNattf4ObRvbv}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.30}
      - RFDETR_DEVICE=auto
    volumes:
      - ./models:/app/models
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rabbitmq_prod_data:
