version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ai_rabbitmq_prod
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  server_pc:
    build:
      context: .
      dockerfile: server_pc/Dockerfile
      args:
        INSTALL_LOCAL_ML: ${INSTALL_LOCAL_ML:-false}
    container_name: ai_server_pc_prod
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - DEVICE_PROFILE=server
      - SERVER_INFERENCE_BACKEND=${SERVER_INFERENCE_BACKEND:-roboflow}
      - HARNESS_CHECKPOINT_DIR=${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:?ROBOFLOW_API_KEY is required for roboflow backend}
      - ROBOFLOW_API_URL=${ROBOFLOW_API_URL:-http://roboflow-inference:9001}
      - ROBOFLOW_WORKSPACE_NAME=${ROBOFLOW_WORKSPACE_NAME:-les-workspace-ijdwd}
      - ROBOFLOW_WORKFLOW_ID=${ROBOFLOW_WORKFLOW_ID:-evn-object-detection-vevn-object-detection-cnyo0-1-rfdetr-small-t1-logic}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:?RABBITMQ_USER is required}
      - RABBITMQ_PASS=${RABBITMQ_PASS:?RABBITMQ_PASS is required}
      - CALLBACK_BASE_URL=${CALLBACK_BASE_URL:?CALLBACK_BASE_URL is required}
      - AI_SERVICE_KEY=${AI_SERVICE_KEY:?AI_SERVICE_KEY is required}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.30}
      - RFDETR_DEVICE=auto
      - ALLOW_PRIVATE_IPS=${ALLOW_PRIVATE_IPS:-false}
      - AI_ARTIFACT_DIR=/app/artifacts
      - AI_ARTIFACT_URL_PATH=/artifacts
      - AI_PUBLIC_BASE_URL=${SERVER_AI_PUBLIC_BASE_URL:-http://localhost:8002}
      - AI_ARTIFACT_JPEG_QUALITY=${AI_ARTIFACT_JPEG_QUALITY:-90}
    volumes:
      - ./models:/app/models
      - server_artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  rabbitmq_prod_data:
  server_artifacts:
