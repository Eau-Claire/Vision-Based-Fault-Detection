services:
  server_pc:
    build:
      context: .
      dockerfile: server_pc/Dockerfile
      args:
        INSTALL_LOCAL_ML: ${INSTALL_LOCAL_ML:-false}
    container_name: ai_server_pc
    ports:
      - "8002:8002"
    environment:
      DEVICE_PROFILE: server
      SERVER_INFERENCE_BACKEND: ${SERVER_INFERENCE_BACKEND:-roboflow}
      HARNESS_CHECKPOINT_DIR: ${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
      RABBITMQ_HOST: ${PMS_RABBITMQ_HOST:-uav-rabbitmq}
      RABBITMQ_PORT: ${PMS_RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-${RABBITMQ_PASSWORD:-guest}}
      CALLBACK_BASE_URL: ${PMS_CALLBACK_BASE_URL:-http://uav-gateway:8080}
      AI_SERVICE_KEY: ${AI_SERVICE_KEY:-${AIService_ServiceKey:?AIService_ServiceKey or AI_SERVICE_KEY is required}}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.30}
      RFDETR_DEVICE: ${RFDETR_DEVICE:-auto}
      ALLOW_PRIVATE_IPS: ${ALLOW_PRIVATE_IPS:-true}
      RESTRICT_CALLBACK_TO_BASE_URL: ${RESTRICT_CALLBACK_TO_BASE_URL:-true}
      AI_ARTIFACT_DIR: /app/artifacts
      AI_ARTIFACT_URL_PATH: /artifacts
      AI_PUBLIC_BASE_URL: ${SERVER_AI_PUBLIC_BASE_URL:-http://localhost:8002}
      AI_ARTIFACT_JPEG_QUALITY: ${AI_ARTIFACT_JPEG_QUALITY:-90}
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY:-}
      ROBOFLOW_API_URL: ${ROBOFLOW_API_URL:-https://serverless.roboflow.com}
      ROBOFLOW_WORKSPACE_NAME: ${ROBOFLOW_WORKSPACE_NAME:-les-workspace-ijdwd}
      ROBOFLOW_WORKFLOW_ID: ${ROBOFLOW_WORKFLOW_ID:-evn-object-detection-vevn-object-detection-cnyo0-1-rfdetr-small-t1-logic}
    volumes:
      - ./models:/app/models:ro
      - server_artifacts:/app/artifacts
      - server_harness_checkpoints:${HARNESS_CHECKPOINT_DIR:-/tmp/vision-harness-checkpoints}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pms_default
    restart: unless-stopped

  edge_raspberry:
    build:
      context: .
      dockerfile: edge_raspberry/Dockerfile
    container_name: ai_edge_raspberry
    profiles:
      - edge
    ports:
      - "8001:8001"
    environment:
      DEVICE_PROFILE: edge
      RABBITMQ_HOST: ${PMS_RABBITMQ_HOST:-uav-rabbitmq}
      RABBITMQ_PORT: ${PMS_RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-${RABBITMQ_PASSWORD:-guest}}
      CALLBACK_BASE_URL: ${PMS_CALLBACK_BASE_URL:-http://uav-gateway:8080}
      AI_SERVICE_KEY: ${AI_SERVICE_KEY:-${AIService_ServiceKey:?AIService_ServiceKey or AI_SERVICE_KEY is required}}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.25}
      ALLOW_PRIVATE_IPS: ${ALLOW_PRIVATE_IPS:-true}
      RESTRICT_CALLBACK_TO_BASE_URL: ${RESTRICT_CALLBACK_TO_BASE_URL:-true}
      AI_ARTIFACT_DIR: /app/artifacts
      AI_ARTIFACT_URL_PATH: /artifacts
      AI_PUBLIC_BASE_URL: ${EDGE_AI_PUBLIC_BASE_URL:-http://localhost:8001}
      AI_ARTIFACT_JPEG_QUALITY: ${AI_ARTIFACT_JPEG_QUALITY:-90}
    volumes:
      - ./models:/app/models:ro
      - edge_artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pms_default
    restart: unless-stopped

volumes:
  server_artifacts:
  server_harness_checkpoints:
  edge_artifacts:

networks:
  pms_default:
    external: true
